_format_version: "1.1"
_transform: true

services:
  - name: supabase
    url: http://postgrest:3000
    routes:
      - name: rest
        paths:
          - /rest/v1
        strip_path: true
  - name: auth
    url: http://gotrue:8080
    routes:
      - name: auth
        paths:
          - /auth/v1
        strip_path: true
  - name: storage
    url: http://storage:7000
    routes:
      - name: storage
        paths:
          - /storage/v1
        strip_path: true
